ais:
  claude:
    cmd: "claude"
    prompt_flag: "-p"
    flags: ["--dangerously-skip-permissions"]
    color: "blue"
    icon: "🔵"
  gemini:
    cmd: "gemini"
    prompt_flag: "-p"
    flags: ["--yolo"]
    color: "green"
    icon: "🟢"
    timeout: 60
  codex:
    cmd: "codex"
    subcommand: "exec"
    flags: []
    color: "yellow"
    icon: "🟡"

deep:
  moderator_rotation: ["gemini", "codex", "claude"]
  speaking_order: ["claude", "codex", "gemini"]
  full_rounds_kept: 3
  compress_summary_max: 80
  timeout_seconds: 30

history:
  obsidian_vault: "/Users/chuan/Workspace/notes"  # 留空则默认存至 ~/Documents/ai-roundtable/

version: "0.0.12"
