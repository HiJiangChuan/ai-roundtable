ais:
  claude:
    cmd: "claude"
    prompt_flag: "-p"
    flags: ["--dangerously-skip-permissions"]
    color: "blue"
    icon: "🔵"
    timeout: 600
  gemini:
    cmd: "gemini"
    prompt_flag: "-p"
    flags: ["--yolo"]
    color: "green"
    icon: "🟢"
    timeout: 90
  codex:
    cmd: "codex"
    subcommand: "exec"
    flags: []
    color: "yellow"
    icon: "🟡"
    timeout: 60

deep:
  full_rounds_kept: 3
  compress_summary_max: 80
  timeout_seconds: 60

history:
  obsidian_vault: ""  # 填入 Obsidian vault 路径，留空则存至 ~/Documents/ai-roundtable/

version: "0.0.38"
