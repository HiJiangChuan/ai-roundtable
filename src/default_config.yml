ais:
  claude:
    cmd: "claude"
    prompt_flag: "-p"
    flags: ["--dangerously-skip-permissions"]
    color: "blue"
    icon: "🔵"
    timeout: 600
  gemini:
    cmd: "gemini"
    prompt_flag: "-p"
    flags: ["--yolo"]
    color: "green"
    icon: "🟢"
    timeout: 300     # 仅用于 idle 通知间隔，进程自然退出为完成信号
  codex:
    cmd: "codex"
    subcommand: "exec"
    flags: []
    color: "yellow"
    icon: "🟡"
    timeout: 300     # 仅用于 idle 通知间隔，task_complete 事件为完成信号

conductor:
  default_conductor: "claude"   # 担任指挥的 AI（需在 ais 中存在）

deep:
  full_rounds_kept: 3
  compress_summary_max: 80
  timeout_seconds: 60

history:
  obsidian_vault: ""  # 填入 Obsidian vault 路径，留空则存至 ~/Documents/ai-roundtable/

version: "0.0.54"
