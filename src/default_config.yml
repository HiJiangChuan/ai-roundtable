ais:
  claude:
    cmd: "claude"
    prompt_flag: "-p"
    flags: ["--dangerously-skip-permissions"]
    color: "blue"
    icon: "🔵"
    timeout: 600
  gemini:
    cmd: "gemini"
    prompt_flag: "-p"
    flags: ["--yolo", "--model", "gemini-2.5-flash"]  # gemini-2.5-pro 质量更高但更慢
    color: "green"
    icon: "🟢"
    timeout: 300     # 仅用于 idle 通知间隔，进程自然退出为完成信号
  codex:
    cmd: "codex"
    subcommand: "exec"
    flags: []
    color: "yellow"
    icon: "🟡"
    timeout: 300     # 仅用于 idle 通知间隔，turn.completed 事件为完成信号

deep:
  full_rounds_kept: 3
  compress_summary_max: 80
  timeout_seconds: 60

history:
  obsidian_vault: ""  # 填入 Obsidian vault 路径，留空则存至 ~/Documents/ai-roundtable/

version: "0.0.66"
