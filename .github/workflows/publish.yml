name: Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC trusted publishing，无需 API token
      contents: read   # 私有仓库需要显式声明读取权限

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 - <<'EOF'
          import re
          text = open("pyproject.toml", encoding="utf-8").read()
          print(re.search(r'^version = "(.+?)"', text, re.M).group(1))
          EOF
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if version already on PyPI
        id: check
        run: |
          STATUS=$(python3 -c "
          import urllib.request
          try:
              urllib.request.urlopen('https://pypi.org/pypi/ai-roundtable/${{ steps.version.outputs.version }}/json')
              print('exists')
          except Exception:
              print('new')
          ")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "PyPI status: $STATUS"

      - name: Run tests
        if: steps.check.outputs.status == 'new'
        run: |
          pip install -e ".[dev]" -q
          python -m pytest tests/ -q

      - name: Build package
        if: steps.check.outputs.status == 'new'
        run: |
          pip install build -q
          python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.status == 'new'
        uses: pypa/gh-action-pypi-publish@release/v1
